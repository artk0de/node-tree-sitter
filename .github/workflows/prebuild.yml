name: Build Prebuilds

on:
  push:
    tags:
      - 'v*-prebuild*'
  workflow_dispatch:

jobs:
  prebuild:
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
          - os: macos-15-intel
            platform: darwin-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: win32-x64
          - os: windows-11-arm
            platform: win32-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install --ignore-scripts
      - run: npx prebuildify --napi --strip

      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}
          path: prebuilds/
